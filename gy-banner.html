<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guangyuan Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/style.css" />
  </head>
  <body class="gy-banner-body">
<div class="banner-slider" id="slider">
    <!-- 三張圖片區塊 -->
    <div class="slide active" style="background-image: url('https://picsum.photos/1920/1080?random=1');">
      <div class="slide-content">
        <h1>第一張 Banner 標題</h1>
        <p>這裡可以放副標題或是簡短的產品介紹文字。</p>
      </div>
    </div>

    <div class="slide" style="background-image: url('https://picsum.photos/1920/1080?random=2');">
      <div class="slide-content">
        <h1>第二張 Banner 標題</h1>
        <p>滿版視野讓視覺效果更具震撼力。</p>
      </div>
    </div>

    <div class="slide" style="background-image: url('https://picsum.photos/1920/1080?random=3');">
      <div class="slide-content">
        <h1>第三張 Banner 標題</h1>
        <p>支援手機觸控滑動與滑鼠按住拖曳。</p>
      </div>
    </div>

    <!-- 左右切換按鈕 -->
    <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
    <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>

    <!-- 下方指示點 -->
    <div class="dots-container" id="dotsContainer"></div>
  </div>
  </body>
  <script src="src/script.js"></script>
</html>
